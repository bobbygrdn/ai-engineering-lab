services:
  db:
    image: pgvector/pgvector:pg18
    container_name: cross-encoder-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vectordb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "vectordb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: